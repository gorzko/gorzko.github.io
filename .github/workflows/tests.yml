name: Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'ptaki-przewodnik/data/ptaki.json'
      - 'tests/**'
      - 'package.json'
  pull_request:
    branches: [ main ]
    paths:
      - 'ptaki-przewodnik/data/ptaki.json'
      - 'tests/**'
      - 'package.json'

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm install
    
    - name: Run tests
      run: npm test
      id: tests
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          tests/
          package.json
