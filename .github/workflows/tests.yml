name: Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'ptaki-przewodnik/data/ptaki.json'
      - 'ptaki-przewodnik/script.js'
      - 'ptaki-przewodnik/index.html'
      - 'tests/**'
      - 'package.json'
      - 'playwright.config.js'
  pull_request:
    branches: [ main ]
    paths:
      - 'ptaki-przewodnik/data/ptaki.json'
      - 'ptaki-przewodnik/script.js'
      - 'ptaki-przewodnik/index.html'
      - 'tests/**'
      - 'package.json'
      - 'playwright.config.js'

jobs:
  unit:
    name: Schema Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
