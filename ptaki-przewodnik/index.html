<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Przewodnik Ptaków Polski</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <!-- Facebook SDK for embedded video player -->
  <div id="fb-root"></div>
  <script async defer crossorigin="anonymous" src="https://connect.facebook.net/pl_PL/sdk.js#xfbml=1&version=v18.0" nonce="vQx5m4j7"></script>
</head>
<body>
  <header>
    <h1>Przewodnik Ptaków Polski</h1>
    <p>Poznaj gatunki ptaków lęgowych w Polsce</p>
    
    <!-- Wyszukiwarka i filtry -->
    <div class="search-container" id="search-container">
      <div class="search-box">
        <label for="search-input" class="visually-hidden">Wyszukaj ptaka</label>
        <input 
          type="text" 
          id="search-input" 
          placeholder="Wyszukaj ptaka po nazwie polskiej lub łacińskiej..."
          aria-label="Wyszukaj ptaka po nazwie polskiej lub łacińskiej"
        >
        <button id="search-clear" class="search-clear" aria-label="Wyczyść wyszukiwanie">✕</button>
      </div>
      
      <div class="filter-container">
        <span class="filter-label">Filtruj po kategorii:</span>
        <button class="filter-btn active" data-category="all" aria-pressed="true">Wszystkie</button>
        <button class="filter-btn" data-category="Ogród" aria-pressed="false">Ogród</button>
        <button class="filter-btn" data-category="Najliczniejsze" aria-pressed="false">Najliczniejsze</button>
        <button class="filter-btn" data-category="Najpowszechniejsze" aria-pressed="false">Najpowszechniejsze</button>
      </div>
      
      <div class="results-info" id="results-info" aria-live="polite"></div>
    </div>
  </header>

  <main>
    <div class="container" id="birds-container" role="region" aria-live="polite" aria-label="Lista kart ptaków">
      <!-- Karty będą tutaj dynamicznie dodawane -->
    </div>
    <div class="loading-indicator" id="loading-indicator" role="status" aria-live="polite">
      <p>Ładowanie kart...</p>
    </div>
  </main>

  <footer>
    <p>Źródła: MPPL 2025, Czerwona Księga Ptaków Polski, Leśny Budzik (YouTube)</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
